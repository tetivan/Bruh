<html lang="ru">
<head>

    <title>Каталог кроссовок | Модели и размеры</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1rem;
            color: #1e293b;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: #ffffff;
            padding: 1.8rem 2rem 1.2rem 2rem;
            border-bottom: 1px solid #e9eef3;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e293b, #2d3a4f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .header p {
            color: #5b6e8c;
            margin-top: 6px;
            font-size: 0.9rem;
        }

        .filter-bar {
            padding: 1.2rem 2rem;
            background: #fafcff;
            border-bottom: 1px solid #eef2f8;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }

        .filter-label {
            font-weight: 500;
            font-size: 0.85rem;
            color: #2c3e66;
            background: #eef2fa;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-btn {
            background: #f1f4f9;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
            color: #2c3e66;
            cursor: pointer;
            transition: 0.2s;
        }

        .filter-btn.active {
            background: #1e293b;
            color: white;
        }

        .filter-btn:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        .reset-filter {
            background: transparent;
            border: 1px solid #cdd9ed;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #4b6b8f;
            cursor: pointer;
            transition: 0.2s;
        }

        .reset-filter:hover {
            background: #eef2fa;
            border-color: #a0bbd8;
        }

        .stats {
            font-size: 0.8rem;
            color: #4f7092;
            margin-left: auto;
            background: #eef2fa;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .catalog {
            padding: 1rem 1.5rem 2rem 1.5rem;
        }

        .model-card {
            margin-bottom: 0.75rem;
            border-bottom: 1px solid #edf2f7;
        }

        .model-title {
            font-size: 1.2rem;
            font-weight: 600;
            padding: 1rem 0.8rem;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
        }

        .model-title:hover {
            background: #f8fafd;
            padding-left: 1rem;
        }

        .model-name {
            color: #0f2b3d;
        }

        .toggle-icon {
            font-size: 1.3rem;
            color: #86a2c5;
        }

        .model-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease-out;
            background: #fefefe;
            margin: 0 0.2rem 0.8rem 0.2rem;
            border-radius: 24px;
        }

        .model-details.open {
            max-height: 1200px;
            transition: max-height 0.45s ease-in-out;
        }

        .details-inner {
            padding: 0.2rem 1rem 1.2rem 1.8rem;
            border-left: 3px solid #dce5f0;
            margin-left: 0.6rem;
        }

        .sku-block {
            margin-bottom: 1rem;
            background: #ffffff;
            border-radius: 20px;
            padding: 0.8rem 1rem;
            border: 1px solid #eff3f9;
        }

        .sku-code {
            font-weight: 600;
            font-family: 'SF Mono', monospace;
            font-size: 0.85rem;
            color: #2563eb;
            background: #eef4ff;
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
        }

        .sku-code:hover {
            background: #2563eb;
            color: white;
            transform: translateY(-1px);
        }

        .sku-sizes {
            font-size: 0.9rem;
            color: #334155;
            margin-top: 6px;
        }

        .size-badge {
            display: inline-block;
            background: #eef2ff;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            margin: 0 5px 5px 0;
            color: #1e40af;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: #fafcff;
            border-radius: 40px;
            color: #6c86a3;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 1rem;
            color: #8ca3c2;
            border-top: 1px solid #ecf2f9;
        }

        @media (max-width: 640px) {
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .stats {
                margin-left: 0;
                text-align: center;
            }
            .model-title {
                font-size: 1rem;
                padding: 0.8rem 0.4rem;
            }
            .details-inner {
                padding-left: 0.8rem;
            }
        }
    </style>
</head>

        { name: "VOYAGER FLX", skus: [{ article: "2109391-010", sizes: ["12 US"] }] },
        { name: "WOODLAND 2 TEXAPORE MID M", skus: [{ article: "4051261-5076", sizes: ["12 US"] }] },
        { name: "X-RAY 2 SQUARE", skus: [{ article: "37310850", sizes: ["12 US"] }] },
        { name: "X-RAY 3 SD", skus: [{ article: "39966804", sizes: ["12 US", "13 US"] }] },
        { name: "ZOOM FLY 5", skus: [{ article: "DM8968-001", sizes: ["12.5 US"] }] },
    ];

    const FILTER_SIZES = ["12 US", "12.5 US", "13 US", "14 US", "14.5 US", "15 US"];
    let activeSizes = new Set();
    let openModelIndex = null;

    function encodeSearchQuery(modelName, article) {
        // Формируем поисковый запрос: "модель артикул"
        const query = `${modelName} ${article}`;
        return SEARCH_URL + encodeURIComponent(query);
    }

    function getFilteredModels() {
        if (activeSizes.size === 0) {
            return rawData.map(model => ({ ...model, skus: [...model.skus] }));
        }
        return rawData.map(model => {
            const filteredSkus = model.skus.filter(sku => sku.sizes.some(sz => activeSizes.has(sz)));
            if (filteredSkus.length === 0) return null;
            return { ...model, skus: filteredSkus };
        }).filter(m => m !== null);
    }
    
    function renderCatalog() {
        const filteredModels = getFilteredModels();
        const container = document.getElementById('catalogContainer');
        const statsSpan = document.getElementById('statsInfo');
        statsSpan.innerText = `Показано моделей: ${filteredModels.length}`;
        
        if (filteredModels.length === 0) {
            container.innerHTML = `<div class="empty-state">😕 Нет моделей с выбранными размерами. Попробуйте изменить фильтр.</div>`;
            openModelIndex = null;
            return;
        }
        
        let html = '';
        filteredModels.forEach((model, idx) => {
            const isOpen = (openModelIndex === idx);
            let skusHtml = '';
            for (let sku of model.skus) {
                const sizeBadges = sku.sizes.map(s => `<span class="size-badge">${s}</span>`).join('');
                const searchLink = encodeSearchQuery(model.name, sku.article);
                skusHtml += `
                    <div class="sku-block">
                        <a href="${searchLink}" target="_blank" class="sku-code" title="Найти в интернете">🔗 ${sku.article}</a>
                        <div class="sku-sizes">${sizeBadges}</div>
                    </div>
                `;
            }
            const detailsClass = isOpen ? 'model-details open' : 'model-details';
            html += `
                <div class="model-card" data-model-index="${idx}">
                    <div class="model-title" data-idx="${idx}">
                        <span class="model-name">👟 ${model.name}</span>
                        <span class="toggle-icon">${isOpen ? '▲' : '▼'}</span>
                    </div>
                    <div class="${detailsClass}">
                        <div class="details-inner">
                            ${skusHtml}
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        
        document.querySelectorAll('.model-title').forEach(el => {
            el.addEventListener('click', (e) => {
                // Если клик был именно по заголовку (не по ссылке внутри)
                const idxAttr = el.getAttribute('data-idx');
                if (idxAttr === null) return;
                const clickedIdx = parseInt(idxAttr, 10);
                if (openModelIndex === clickedIdx) {
                    openModelIndex = null;
                } else {
                    openModelIndex = clickedIdx;
                }
                renderCatalog();
            });
        });
    }
    
    function initFilters() {
        const container = document.getElementById('sizeFilterContainer');
        FILTER_SIZES.forEach(size => {
            const btn = document.createElement('button');
            btn.classList.add('filter-btn');
            btn.textContent = size;
            btn.dataset.size = size;
            btn.addEventListener('click', () => {
                if (activeSizes.has(size)) {
                    activeSizes.delete(size);
                    btn.classList.remove('active');
                } else {
                    activeSizes.add(size);
                    btn.classList.add('active');
                }
                openModelIndex = null;
                renderCatalog();
            });
            container.appendChild(btn);
        });
        document.getElementById('resetFiltersBtn').addEventListener('click', () => {
            activeSizes.clear();
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            openModelIndex = null;
            renderCatalog();
        });
    }
    
    initFilters();
    renderCatalog();
</script>
</body>
</html>
